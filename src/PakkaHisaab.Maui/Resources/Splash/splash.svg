<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 640">
  <g transform="translate(0,20)">
  <!-- Back ledger card (dark teal) -->
  <rect x="176" y="64" width="224" height="296" rx="26" fill="#0F766E"/>
  <!-- Middle ledger card (paper) -->
  <rect x="138" y="82" width="224" height="296" rx="26" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="4"/>
  <!-- Front ledger card (bright teal) -->
  <rect x="100" y="102" width="224" height="296" rx="26" fill="#14B8A6"/>
  <!-- Rupee glyph (drawn as paths so no font dependency) -->
  <g stroke="#FFFFFF" stroke-width="14" fill="none" stroke-linejoin="round"
     transform="translate(151,180) scale(1.55)">
    <path d="M6 7 H62" stroke-linecap="butt"/>
    <path d="M6 31 H62" stroke-linecap="butt"/>
    <path d="M40 7 C70 7 70 31 40 31" stroke-linecap="butt"/>
    <path d="M40 33 L12 80" stroke-linecap="round"/>
  </g>
  <!-- Emerald check with white casing -->
  <path d="M300 330 L362 404 L466 232" fill="none" stroke="#FFFFFF" stroke-width="60"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M300 330 L362 404 L466 232" fill="none" stroke="#10B981" stroke-width="36"
        stroke-linecap="round" stroke-linejoin="round"/>
</g>
  <text x="256" y="560" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#1E293B">Tap. Track. Settle.</text>
  <text x="256" y="608" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"
        font-size="26" font-weight="600" fill="#64748B">PakkaHisaab &#183; ClearKhata</text>
</svg>